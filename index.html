<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>الساعة الذكية | Mohamed Mustafa</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%2364ffda'%3E%3Cpath d='M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 4c.55 0 1 .45 1 1v5l3.5 2.08c.47.28.64.89.36 1.36-.28.47-.89.64-1.36.36l-4-2.38c-.31-.18-.5-.51-.5-.88V7c0-.55.45-1 1-1z'/%3E%3C/svg%3E">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        :root {
            --bg-dark: linear-gradient(145deg, #0a0f1e 0%, #03060c 100%);
            --bg-light: #f5f0e8;
            --card-dark: rgba(15, 25, 45, 0.6);
            --card-light: rgba(255, 255, 255, 0.85);
            --text-dark: #e6f1ff;
            --text-light: #2c3e50;
            --accent-dark: #64ffda;
            --accent-light: #5dade2;
            --border-dark: rgba(100, 255, 218, 0.2);
            --border-light: rgba(93, 173, 226, 0.25);
            --danger: #ff6b6b;
            --gold: #ffd700;
        }

        body {
            background: var(--bg-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, sans-serif;
            padding: 20px;
            transition: all 0.3s ease;
            position: relative;
        }

        body.light {
            background: var(--bg-light);
        }

        #particlesCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 550px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .left-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            background: rgba(100, 255, 218, 0.12);
            border: 1.5px solid var(--accent-dark);
            padding: 8px 18px;
            border-radius: 50px;
            color: var(--accent-dark);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.25s;
            font-size: 0.8rem;
        }

        body.light .btn {
            border-color: var(--accent-light);
            color: var(--accent-light);
            background: rgba(93, 173, 226, 0.1);
        }

        .btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 12px rgba(100, 255, 218, 0.3);
        }

        .bell-icon {
            position: relative;
            cursor: pointer;
            background: rgba(100, 255, 218, 0.15);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
        }

        .bell-icon:hover {
            transform: scale(1.05);
            background: var(--accent-dark);
        }

        .notification-badge {
            position: absolute;
            top: -5px;
            right: -5px;
            background: #ff6b6b;
            color: white;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            font-size: 11px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        .clock-card {
            background: var(--card-dark);
            backdrop-filter: blur(20px);
            border-radius: 45px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-dark);
            margin-bottom: 20px;
        }

        body.light .clock-card {
            background: var(--card-light);
            border-color: var(--border-light);
        }

        .digital-time {
            font-size: 3.5rem;
            font-weight: 800;
            font-family: 'Courier New', monospace;
            letter-spacing: 4px;
            background: linear-gradient(135deg, var(--accent-dark) 0%, #ffffff 100%);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }

        body.light .digital-time {
            background: linear-gradient(135deg, var(--accent-light) 0%, var(--text-light) 100%);
            background-clip: text;
            -webkit-background-clip: text;
        }

        .date-full {
            font-size: 0.85rem;
            color: #8892b0;
            padding-top: 8px;
        }

        .analog-wrapper {
            display: flex;
            justify-content: center;
            margin: 15px 0;
        }

        canvas {
            width: 230px;
            height: 230px;
            border-radius: 50%;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
        }

        .section {
            background: var(--card-dark);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 15px;
            margin-top: 12px;
            border: 1px solid var(--border-dark);
            text-align: center;
        }

        body.light .section {
            background: var(--card-light);
        }

        .section-title {
            color: var(--accent-dark);
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 12px;
            display: inline-block;
            border-bottom: 2px solid var(--accent-dark);
            padding-bottom: 3px;
        }

        /* المؤقت الجديد */
        .new-timer-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
        }

        .timer-arrow {
            background: rgba(100, 255, 218, 0.2);
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            font-size: 1.3rem;
            cursor: pointer;
            color: var(--accent-dark);
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .timer-arrow:hover {
            background: var(--accent-dark);
            color: #0a0f1e;
            transform: scale(1.05);
        }

        .timer-time {
            font-size: 2rem;
            font-weight: bold;
            font-family: monospace;
            color: var(--accent-dark);
            min-width: 100px;
            text-align: center;
            letter-spacing: 3px;
        }

        .timer-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* قوائم المنبه */
        .alarm-selects {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .alarm-select {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid var(--accent-dark);
            padding: 10px 15px;
            border-radius: 35px;
            color: white;
            font-size: 1rem;
            font-family: monospace;
            font-weight: bold;
            cursor: pointer;
            text-align: center;
        }

        body.light .alarm-select {
            background: white;
            color: var(--text-light);
            border-color: var(--accent-light);
        }

        .alarm-select option {
            background: #1a1a1a;
            color: white;
        }

        body.light .alarm-select option {
            background: white;
            color: var(--text-light);
        }

        .alarm-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .dhikr-text {
            font-size: 0.95rem;
            line-height: 1.7;
            color: var(--text-dark);
            margin: 10px 0;
            padding: 8px;
            border-radius: 20px;
            background: rgba(100, 255, 218, 0.05);
            font-family: 'Traditional Arabic', 'Amiri', serif;
        }

        body.light .dhikr-text {
            color: var(--text-light);
        }

        .dhikr-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 8px;
            font-size: 0.65rem;
            color: #8892b0;
        }

        .next-dhikr-btn {
            background: none;
            border: 1px solid var(--accent-dark);
            padding: 3px 12px;
            border-radius: 50px;
            color: var(--accent-dark);
            cursor: pointer;
            font-size: 0.65rem;
        }

        .prayer-row {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .prayer-item {
            background: rgba(100, 255, 218, 0.1);
            padding: 5px 12px;
            border-radius: 30px;
            font-size: 0.75rem;
            color: var(--text-dark);
        }

        body.light .prayer-item {
            background: rgba(93, 173, 226, 0.1);
            color: var(--text-light);
        }

        .flex-row {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }

        .display-value {
            font-size: 1.2rem;
            font-family: monospace;
            font-weight: bold;
            color: var(--accent-dark);
            background: rgba(0, 0, 0, 0.3);
            padding: 4px 12px;
            border-radius: 35px;
            min-width: 95px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-dark);
            backdrop-filter: blur(20px);
            border-radius: 30px;
            width: 90%;
            max-width: 400px;
            max-height: 70%;
            overflow: hidden;
            border: 1px solid var(--border-dark);
        }

        body.light .modal-content {
            background: white;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-dark);
        }

        .modal-header h3 {
            color: var(--accent-dark);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--danger);
        }

        .notifications-modal-list {
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }

        .notifications-modal-list::-webkit-scrollbar {
            width: 5px;
        }

        .notifications-modal-list::-webkit-scrollbar-track {
            background: rgba(100, 255, 218, 0.1);
            border-radius: 10px;
        }

        .notifications-modal-list::-webkit-scrollbar-thumb {
            background: var(--accent-dark);
            border-radius: 10px;
        }

        .modal-notif-item {
            background: rgba(100, 255, 218, 0.08);
            border-radius: 20px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .notif-actions {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .read-btn, .delete-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            padding: 4px 8px;
            border-radius: 20px;
            transition: 0.2s;
        }

        .read-btn {
            background: var(--accent-dark);
            color: #0a0f1e;
            font-size: 0.7rem;
        }

        body.light .read-btn {
            background: var(--accent-light);
            color: white;
        }

        .delete-btn {
            background: rgba(255, 107, 107, 0.2);
            color: #ff6b6b;
        }

        .delete-btn:hover {
            background: #ff6b6b;
            color: white;
        }

        .delete-all-btn {
            background: none;
            border: 1px solid #ff6b6b;
            padding: 6px 15px;
            border-radius: 25px;
            color: #ff6b6b;
            cursor: pointer;
            margin: 10px;
            width: calc(100% - 20px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .read-all-btn {
            background: none;
            border: 1px solid var(--accent-dark);
            padding: 6px 15px;
            border-radius: 25px;
            color: var(--accent-dark);
            cursor: pointer;
            margin: 10px;
            width: calc(100% - 20px);
        }

        .footer {
            text-align: center;
            margin-top: 20px;
            padding: 12px;
            background: var(--card-dark);
            backdrop-filter: blur(12px);
            border-radius: 40px;
            border: 1px solid var(--border-dark);
        }

        body.light .footer {
            background: var(--card-light);
        }

        .footer-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .footer a {
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        body:not(.light) .footer a {
            color: #64ffda;
        }

        body:not(.light) .footer a:hover {
            color: #ffd700;
            transform: scale(1.05);
        }

        body.light .footer a {
            color: #e67e22;
        }

        body.light .footer a:hover {
            color: #f39c12;
            transform: scale(1.05);
        }

        .footer .copyright {
            font-size: 0.65rem;
            color: #8892b0;
            margin-top: 8px;
        }

        .welcome-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(100, 255, 218, 0.9);
            color: #0a0f1e;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: bold;
            z-index: 1001;
            animation: fadeOut 3s ease-in-out forwards;
            pointer-events: none;
        }

        body.light .welcome-toast {
            background: rgba(93, 173, 226, 0.9);
            color: white;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateX(-50%) translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; transform: translateX(-50%) translateY(20px); visibility: hidden; }
        }

        @media (max-width: 550px) {
            .digital-time { font-size: 2.5rem; }
            canvas { width: 190px; height: 190px; }
            .timer-time { font-size: 1.5rem; min-width: 80px; }
            .timer-arrow { width: 38px; height: 38px; font-size: 1rem; }
            .alarm-select { padding: 8px 12px; font-size: 0.85rem; }
            .display-value { font-size: 1rem; min-width: 80px; }
        }
    </style>
</head>
<body>

<canvas id="particlesCanvas"></canvas>

<div class="container">
    <div class="top-bar">
        <div class="left-buttons">
            <button class="btn" id="themeBtn">🌙 الليلي</button>
            <button class="btn" id="requestNotifyBtn">🔔 تفعيل</button>
        </div>
        <div class="bell-icon" id="bellIcon">
            🔔
            <span class="notification-badge" id="notifBadge">0</span>

    </div>

    <div class="section">
        <div class="section-title">🕌 أوقات الصلاة (القاهرة)</div>
        <div class="prayer-row" id="prayerTimes">جاري التحميل...</div>
    </div>

    <!-- المنبه الجديد بقوائم منسدلة -->
    <div class="section">
        <div class="section-title">⏰ المنبه</div>
        <div class="alarm-selects">
            <select id="alarmHour" class="alarm-select">
                <option value="1">01</option><option value="2">02</option><option value="3">03</option>
                <option value="4">04</option><option value="5">05</option><option value="6">06</option>

                <option value="10">10</option><option value="11">11</option><option value="12">12</option>
            </select>
            <span style="color:var(--accent-dark); font-size:1.3rem;">:</span>
            <select id="alarmMinute" class="alarm-select">
                <option value="00">00</option><option value="01">01</option><option value="02">02</option>
                <option value="03">03</option><option value="04">04</option><option value="05">05</option>
                <option value="06">06</option><option value="07">07</option><option value="08">08</option>

        <div class="alarm-buttons">
            <button class="btn" id="setAlarmBtn">تعيين</button>
            <button class="btn" id="cancelAlarmBtn">إلغاء</button>

    <div class="section">
        <div class="section-title">⏱️ ساعة توقف</div>
        <div class="flex-row">
            <button class="btn" id="startSwBtn">ابدأ</button>
            <button class="btn" id="pauseSwBtn">إيقاف</button>

    <div class="section">

        <div class="new-timer-container">

<div id="notifModal" class="modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3>📢 الإشعارات</h3>
            <button class="close-modal" id="closeModalBtn">✕</button>
        </div>

            <div style="text-align:center; padding:20px;">لا توجد إشعارات</div>
        </div>
        <button class="delete-all-btn" id="deleteAllBtn">🗑️ حذف الكل</button>
        <button class="read-all-btn" id="readAllBtn">✓ تحديد الكل كمقروء</button>
    </div>
</div>

<script>
    (function() {
        // ========== المتغيرات ==========
        let notifications = [];
        let nextId = 1;
        let notificationPermission = false;
        let alarmTimeout = null;
        let timerInterval = null;
        let swInterval = null, swSeconds = 0;
        let timerSeconds = 60;

        let dhikrList = [];
        let currentDhikrIndex = 0;
        let dhikrInterval = null;
        let countdownSeconds = 30;
        let countdownInterval = null;

        function showWelcome() {
            const welcomeDiv = document.createElement('div');
            welcomeDiv.className = 'welcome-toast';
            welcomeDiv.innerText = '✨ مرحباً بك في ساعتك الذكية ✨';
            document.body.appendChild(welcomeDiv);
            setTimeout(() => welcomeDiv.remove(), 3000);
        }

        // ========== الساعة (بدون اهتزاز) ==========
        const canvas = document.getElementById('analogCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 500; canvas.height = 500;
        const cx = 250, cy = 250, rad = 210;
        
        function drawAnalog() {
            const now = new Date();
            const hours = now.getHours() % 12;
            const minutes = now.getMinutes();
            const seconds = now.getSeconds();
            const hourAng = (hours * 30 + minutes * 0.5 - 90) * Math.PI/180;
            const minAng = (minutes * 6 - 90) * Math.PI/180;
            const secAng = (seconds * 6 - 90) * Math.PI/180;
            
            ctx.clearRect(0, 0, 500, 500);
            const isLight = document.body.classList.contains('light');
            const grad = ctx.createRadialGradient(cx-15, cy-15, 10, cx, cy, rad);
            if(isLight) {
                grad.addColorStop(0, '#e8e4d8');
                grad.addColorStop(1, '#d6d0c0');
            } else {
                grad.addColorStop(0, '#0e1622');
                grad.addColorStop(1, '#020408');
            }
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 500, 500);
            
            ctx.beginPath();
            ctx.arc(cx, cy, rad+4, 0, 2*Math.PI);
            ctx.strokeStyle = isLight ? '#5dade2' : '#64ffda';
            ctx.lineWidth = 2.5;
            ctx.stroke();
            
            for(let i=0;i<12;i++) {
                let ang = (i*30-90)*Math.PI/180;
                let x1=cx+Math.cos(ang)*(rad-12), y1=cy+Math.sin(ang)*(rad-12);
                let x2=cx+Math.cos(ang)*(rad-3), y2=cy+Math.sin(ang)*(rad-3);
                ctx.beginPath();
                ctx.moveTo(x1,y1);
                ctx.lineTo(x2,y2);
                ctx.strokeStyle = isLight ? '#2c3e50' : '#e6f1ff';
                ctx.lineWidth = 2;
                ctx.stroke();
            }
            
            ctx.font = `bold ${Math.floor(rad*0.1)}px "Segoe UI"`;
            ctx.fillStyle = isLight ? '#2c3e50' : '#ccddf8';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for(let i=1;i<=12;i++) {
                let ang = (i*30-90)*Math.PI/180;
                let x=cx+Math.cos(ang)*(rad*0.72);
                let y=cy+Math.sin(ang)*(rad*0.72);
                ctx.fillText(i.toString(), x, y);
            }
            
            let hx=cx+Math.cos(hourAng)*(rad*0.48), hy=cy+Math.sin(hourAng)*(rad*0.48);
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(hx,hy);
            ctx.strokeStyle = isLight ? '#2c3e50' : '#f0f3ff'; ctx.lineWidth = 5; ctx.stroke();
            
            let mx=cx+Math.cos(minAng)*(rad*0.68), my=cy+Math.sin(minAng)*(rad*0.68);
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(mx,my);
            ctx.strokeStyle = isLight ? '#5dade2' : '#64ffda'; ctx.lineWidth = 3.5; ctx.stroke();
            
            let sx=cx+Math.cos(secAng)*(rad*0.78), sy=cy+Math.sin(secAng)*(rad*0.78);
            ctx.beginPath(); ctx.moveTo(cx,cy); ctx.lineTo(sx,sy);
            ctx.strokeStyle = '#ff8a7a'; ctx.lineWidth = 2; ctx.stroke();
            
            ctx.beginPath(); ctx.arc(cx,cy,6,0,2*Math.PI);
            ctx.fillStyle = isLight ? '#5dade2' : '#64ffda'; ctx.fill();
            ctx.beginPath(); ctx.arc(cx,cy,2.5,0,2*Math.PI);
            ctx.fillStyle = isLight ? '#2c3e50' : '#0a0f1e'; ctx.fill();
        }
        
        function updateDigital() {
            const now = new Date();
            const hh = now.getHours().toString().padStart(2,'0');
            const mm = now.getMinutes().toString().padStart(2,'0');
            const ss = now.getSeconds().toString().padStart(2,'0');
            document.getElementById('digitalTime').innerHTML = `${hh}:${mm}:${ss}`;
            const opts = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('fullDate').innerHTML = now.toLocaleDateString('ar-EG', opts);
            drawAnalog();
        }
        setInterval(updateDigital, 1000);
        updateDigital();

        // ========== خلفية الجسيمات ==========
        const pCanvas = document.getElementById('particlesCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        
        function resizeParticles() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }
        
        window.addEventListener('resize', resizeParticles);
        resizeParticles();
        
        function getParticleColor() {
            const isLight = document.body.classList.contains('light');
            if(isLight) {
                return `rgba(93, 173, 226, 0.5)`;
            } else {
                return `rgba(100, 255, 218, 0.4)`;
            }
        }
        
        for(let i=0;i<100;i++) {
            particles.push({
                x: Math.random() * pCanvas.width,
                y: Math.random() * pCanvas.height,
                radius: Math.random() * 2 + 1,
                alpha: Math.random() * 0.5,
                speedX: (Math.random() - 0.5) * 0.3,
                speedY: (Math.random() - 0.5) * 0.3
            });
        }
        
        function drawParticles() {
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            const particleColor = getParticleColor();
            for(let p of particles) {
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.radius, 0, 2 * Math.PI);
                pCtx.fillStyle = particleColor;
                pCtx.fill();
                p.x += p.speedX;
                p.y += p.speedY;
                if(p.x < 0) p.x = pCanvas.width;
                if(p.x > pCanvas.width) p.x = 0;
                if(p.y < 0) p.y = pCanvas.height;
                if(p.y > pCanvas.height) p.y = 0;
            }
            requestAnimationFrame(drawParticles);
        }
        drawParticles();

        // ========== الإشعارات ==========
        function addNotification(title, message) {
            const newNotif = {
                id: nextId++,
                title: title,
                message: message,
                time: new Date().toLocaleTimeString('ar-EG'),
                read: false
            };
            notifications.unshift(newNotif);
            updateNotificationUI();
            
            if(notificationPermission && Notification.permission === 'granted') {
                new Notification(title, { body: message });
            }
            
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 880;
                gainNode.gain.value = 0.2;
                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                oscillator.stop(audioCtx.currentTime + 0.5);
            } catch(e) {}
        }
        
        function updateNotificationUI() {
            const unreadCount = notifications.filter(n => !n.read).length;
            document.getElementById('notifBadge').innerText = unreadCount;
            
            const modalContainer = document.getElementById('modalNotificationsList');
            if(notifications.length === 0) {
                modalContainer.innerHTML = '<div style="text-align:center; padding:20px;">لا توجد إشعارات</div>';
                return;
            }
            modalContainer.innerHTML = notifications.map(n => `
                <div class="modal-notif-item" data-id="${n.id}">
                    <div>
                        <strong>${n.title}</strong><br>
                        <small>${n.message}</small><br>
                        <small style="color:#8892b0;">${n.time}</small>
                    </div>
                    <div class="notif-actions">
                        ${!n.read ? `<button class="read-btn" data-id="${n.id}">✓ قراءة</button>` : '<span style="color:#64ffda;">✓ مقروء</span>'}
                        <button class="delete-btn" data-id="${n.id}" title="حذف">🗑️</button>
                    </div>
                </div>
            `).join('');
            
            document.querySelectorAll('.read-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.dataset.id);
                    markAsRead(id);
                });
            });
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const id = parseInt(btn.dataset.id);
                    deleteNotification(id);
                });
            });
        }
        
        function deleteNotification(id) {
            notifications = notifications.filter(n => n.id !== id);
            updateNotificationUI();
        }
        
        function markAsRead(id) {
            const notif = notifications.find(n => n.id === id);
            if(notif) notif.read = true;
            updateNotificationUI();
        }
        
        const modal = document.getElementById('notifModal');
        const bellIcon = document.getElementById('bellIcon');
        const closeModalBtn = document.getElementById('closeModalBtn');
        const readAllBtn = document.getElementById('readAllBtn');
        const deleteAllBtn = document.getElementById('deleteAllBtn');
        
        bellIcon.onclick = () => { modal.style.display = 'flex'; };
        closeModalBtn.onclick = () => { modal.style.display = 'none'; };
        readAllBtn.onclick = () => { notifications.forEach(n => n.read = true); updateNotificationUI(); };
        deleteAllBtn.onclick = () => { notifications = []; updateNotificationUI(); };
        window.onclick = (e) => { if(e.target === modal) modal.style.display = 'none'; };
        
        document.getElementById('requestNotifyBtn').onclick = async () => {
            if('Notification' in window) {
                const permission = await Notification.requestPermission();
                notificationPermission = permission === 'granted';
                addNotification('✅ تم التفعيل', 'سيتم إشعارك بالمنبهات والمؤقت');
            }
        };

        // ========== الثيم ==========
        const themeBtn = document.getElementById('themeBtn');
        themeBtn.onclick = () => {
            document.body.classList.toggle('light');
            const isLight = document.body.classList.contains('light');
            themeBtn.innerHTML = isLight ? '🌞 النهاري' : '🌙 الليلي';
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            drawAnalog();
        };
        if(localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light');
            themeBtn.innerHTML = '🌞 النهاري';
            drawAnalog();
        }

        // ========== المؤقت ==========
        const timerDisplayMinutes = document.getElementById('timerDisplayMinutes');
        
        function updateTimerDisplay() {
            const mins = Math.floor(timerSeconds / 60);
            const secs = timerSeconds % 60;
            timerDisplayMinutes.innerHTML = `${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
            if(timerSeconds === 0 && timerInterval) {
                clearInterval(timerInterval);
                addNotification('⏲️ المؤقت', 'انتهى الوقت المحدد!');
            }
        }
        
        document.getElementById('timerUpBtn').onclick = () => {
            if(timerSeconds < 3599) timerSeconds += 60;
            updateTimerDisplay();
        };
        
        document.getElementById('timerDownBtn').onclick = () => {
            if(timerSeconds >= 60) timerSeconds -= 60;
            updateTimerDisplay();
        };
        
        function startTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if(timerSeconds > 0) {
                    timerSeconds--;
                    updateTimerDisplay();
                } else {
                    clearInterval(timerInterval);
                }
            }, 1000);
        }
        
        function resetTimer() {
            if(timerInterval) clearInterval(timerInterval);
            timerSeconds = 60;
            updateTimerDisplay();
        }
        
        document.getElementById('startTimerBtn').onclick = startTimer;
        document.getElementById('resetTimerBtn').onclick = resetTimer;

        // ========== ساعة التوقف ==========
        const swDisp = document.getElementById('stopwatchDisplay');
        function updateSW() {
            let hrs = Math.floor(swSeconds/3600);
            let mins = Math.floor((swSeconds%3600)/60);
            let secs = swSeconds%60;
            swDisp.innerText = `${hrs.toString().padStart(2,'0')}:${mins.toString().padStart(2,'0')}:${secs.toString().padStart(2,'0')}`;
        }
        document.getElementById('startSwBtn').onclick = () => {
            if(swInterval) clearInterval(swInterval);
            swInterval = setInterval(() => { swSeconds++; updateSW(); }, 1000);
        };
        document.getElementById('pauseSwBtn').onclick = () => { if(swInterval) clearInterval(swInterval); swInterval=null; };
        document.getElementById('resetSwBtn').onclick = () => { if(swInterval) clearInterval(swInterval); swSeconds=0; updateSW(); };

        // ========== المنبه الجديد ==========
        function getAlarmTime24() {
            let hour = parseInt(document.getElementById('alarmHour').value);
            const minute = document.getElementById('alarmMinute').value;
            const ampm = document.getElementById('alarmAmPm').value;
            
            if (ampm === 'PM' && hour !== 12) hour += 12;
            if (ampm === 'AM' && hour === 12) hour = 0;
            
            return { hour, minute };
        }
        
        document.getElementById('setAlarmBtn').onclick = () => {
            if(alarmTimeout) clearTimeout(alarmTimeout);
            const { hour, minute } = getAlarmTime24();
            const now = new Date();
            let alarmDate = new Date();
            alarmDate.setHours(hour, parseInt(minute), 0);
            if(alarmDate <= now) alarmDate.setDate(alarmDate.getDate()+1);
            const diff = alarmDate - now;
            alarmTimeout = setTimeout(() => {
                addNotification('⏰ المنبه', `حان وقت المنبه ${document.getElementById('alarmHour').value}:${document.getElementById('alarmMinute').value} ${document.getElementById('alarmAmPm').value}`);
            }, diff);
            document.getElementById('alarmStatus').innerHTML = `✅ تم التعيين الساعة ${document.getElementById('alarmHour').value}:${document.getElementById('alarmMinute').value} ${document.getElementById('alarmAmPm').value}`;
            addNotification('🔔 منبه', `تم تعيين منبه الساعة ${document.getElementById('alarmHour').value}:${document.getElementById('alarmMinute').value} ${document.getElementById('alarmAmPm').value}`);
        };
        
        document.getElementById('cancelAlarmBtn').onclick = () => {
            if(alarmTimeout) clearTimeout(alarmTimeout);
            alarmTimeout = null;
            document.getElementById('alarmStatus').innerHTML = '';
            addNotification('❌ منبه', 'تم إلغاء المنبه');
        };

        // ========== الأذكار ==========
        async function fetchDhikr() {
            try {
                const response = await fetch('https://api.aladhan.com/v1/adhkar?category=all');
                const data = await response.json();
                if(data && data.data && data.data.length > 0) {
                    dhikrList = data.data.map(item => item.dhikr || item.text);
                } else throw new Error();
            } catch(e) {
                dhikrList = [
                    "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ، سُبْحَانَ اللَّهِ الْعَظِيمِ",
                    "لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",
                    "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ",
                    "حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ، عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ",
                    "اللَّهُمَّ صَلِّ عَلَى مُحَمَّدٍ وَعَلَى آلِ مُحَمَّدٍ",
                    "أَسْتَغْفِرُ اللَّهَ الْعَظِيمَ الَّذِي لَا إِلَهَ إِلَّا هُوَ الْحَيَّ الْقَيُّومَ وَأَتُوبُ إِلَيْهِ",
                    "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ",
                    "لَا حَوْلَ وَلَا قُوَّةَ إِلَّا بِاللَّهِ الْعَلِيِّ الْعَظِيمِ"
                ];
            }
            if(dhikrList.length) {
                currentDhikrIndex = Math.floor(Math.random() * dhikrList.length);
                updateDhikrDisplay();
                startDhikrTimer();
            }
        }
        
        function updateDhikrDisplay() {
            document.getElementById('dhikrText').innerHTML = `"${dhikrList[currentDhikrIndex]}"`;
        }
        
        function startDhikrTimer() {
            if(dhikrInterval) clearInterval(dhikrInterval);
            if(countdownInterval) clearInterval(countdownInterval);
            countdownSeconds = 30;
            updateCountdown();
            countdownInterval = setInterval(() => {
                countdownSeconds--;
                updateCountdown();
                if(countdownSeconds <= 0) clearInterval(countdownInterval);
            }, 1000);
            dhikrInterval = setInterval(() => {
                currentDhikrIndex = (currentDhikrIndex + 1) % dhikrList.length;
                updateDhikrDisplay();
                countdownSeconds = 30;
                updateCountdown();
                clearInterval(countdownInterval);
                countdownInterval = setInterval(() => {
                    countdownSeconds--;
                    updateCountdown();
                    if(countdownSeconds <= 0) clearInterval(countdownInterval);
                }, 1000);
            }, 30000);
        }
        
        function updateCountdown() {
            document.getElementById('dhikrCounter').innerHTML = `يتغير بعد: ${countdownSeconds} ث`;
        }
        
        document.getElementById('nextDhikrBtn').onclick = () => {
            currentDhikrIndex = (currentDhikrIndex + 1) % dhikrList.length;
            updateDhikrDisplay();
            countdownSeconds = 30;
            updateCountdown();
        };

        // ========== أوقات الصلاة ==========
        async function fetchPrayers() {
            try {
                const res = await fetch('https://api.aladhan.com/v1/timingsByCity?city=Cairo&country=Egypt&method=5');
                const data = await res.json();
                const t = data.data.timings;
                document.getElementById('prayerTimes').innerHTML = `
                    <div class="prayer-item">الفجر: ${t.Fajr}</div>
                    <div class="prayer-item">الظهر: ${t.Dhuhr}</div>
                    <div class="prayer-item">العصر: ${t.Asr}</div>
                    <div class="prayer-item">المغرب: ${t.Maghrib}</div>
                    <div class="prayer-item">العشاء: ${t.Isha}</div>
                `;
            } catch(e) { document.getElementById('prayerTimes').innerHTML = 'حدث خطأ'; }
        }
        fetchPrayers();
        setInterval(fetchPrayers, 3600000);
        
        fetchDhikr();
        showWelcome();
    })();
</script>
